apiVersion: v1
kind: Service
metadata:
  name: minesweeper
  namespace: default
  labels:
    app: minesweeper
spec:
  type: NodePort
  selector:
    app: minesweeper
  ports:
    - name: http
      protocol: TCP
      port: 8080        # ClusterIP port (internal)
      targetPort: 8080  # container port
      nodePort: 30080   # exposed on the EC2 host; ALB Target Group points here
